name: Manual Build MAINNET APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Chọn loại build'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Generate Wrapper
        run: gradle wrapper --gradle-version 8.5

      - name: Build APK MAINNET
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug --stacktrace
          # nếu mày để tên module là wallettemplate thì đổi thành :wallettemplate:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WalletTemplate-MAINNET
          path: app/build/outputs/apk/debug/*.apk
